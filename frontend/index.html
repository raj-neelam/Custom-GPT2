<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT-2 Writer — Neural Text Completion</title>
  <meta name="description" content="Interactive GPT-2 text completion with real-time next-word predictions and probability visualization." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ───────────────────────── HEADER ───────────────────────── -->
  <header id="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-glyph">◈</span>
        <span class="logo-text">GPT<em>-2</em> Writer</span>
      </div>
    </div>
    <div class="header-right">
      <div id="status-badge" class="status-badge status-loading">
        <span class="status-dot"></span>
        <span id="status-label">Connecting…</span>
      </div>
      <span id="device-label" class="device-label" hidden></span>
    </div>
  </header>

  <!-- ───────────────────────── MAIN LAYOUT ───────────────────────── -->
  <main id="main">

    <!-- ── EDITOR ZONE ── -->
    <section id="editor-zone">

      <div id="editor-wrapper">
        <!-- Ghost overlay (absolute, pointer-events: none) -->
        <div id="ghost-overlay" aria-hidden="true"></div>
        <!-- Main writing area -->
        <div
          id="editor"
          contenteditable="true"
          spellcheck="false"
          data-placeholder="Start writing — GPT-2 will predict what comes next…"
          role="textbox"
          aria-multiline="true"
          aria-label="Writing ground"
        ></div>
      </div>

      <!-- ── CONTROLS BAR (Buttons only now) ── -->
      <div id="controls-bar">
        <div class="controls-actions" style="margin-left: 0; width: 100%; justify-content: flex-end;">
          <button id="clear-btn" class="btn btn-ghost" title="Clear editor (Ctrl+Shift+X)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            Clear
          </button>
          <button id="generate-btn" class="btn btn-primary" title="Generate continuation (Ctrl+Enter)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Generate
          </button>
        </div>
      </div>

      <!-- hint -->
      <p class="editor-hint">
        Press <kbd>Tab</kbd> or <kbd>→</kbd> to accept ghost suggestion &nbsp;·&nbsp;
        <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to generate
      </p>
    </section>

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Next Word</span>
      </div>
      <div id="predictions-list" class="predictions-list">
        <div class="predictions-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.2" opacity=".3"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity=".5"/></svg>
          <p>Start typing to see predictions…</p>
        </div>
      </div>
      
      <!-- ── SIDEBAR CONTROLS ── -->
      <div class="sidebar-controls" style="padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface2); display: flex; flex-direction: column; gap: 15px;">
        <div class="control-group" style="justify-content: space-between;">
          <label for="temperature-range" class="control-label">
            Temp
            <span id="temp-value" class="control-value">0.9</span>
          </label>
          <input
            id="temperature-range"
            type="range"
            min="0.1" max="2.0" step="0.05" value="0.9"
            aria-label="Temperature"
            style="width: 100px;"
          />
        </div>

        <div class="control-group" style="justify-content: space-between;">
          <label for="max-tokens-input" class="control-label">
            Max tokens
          </label>
          <input
            id="max-tokens-input"
            type="number"
            min="1" max="500" value="50"
            aria-label="Max new tokens"
            style="width: 70px;"
          />
        </div>
      </div>
    </aside>

  </main>

  <!-- ───────────────────────── TOAST ───────────────────────── -->
  <div id="toast" class="toast" role="alert" aria-live="assertive"></div>

  <script src="app.js"></script>
</body>
</html>
